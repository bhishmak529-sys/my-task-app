<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - TaskPro Elite</title>
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .dashboard-wrapper { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { background: #6366f1; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .back-btn:hover { background: #4f46e5; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        body.light-mode .stat-card { background: #ffffff; border-color: #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-number { font-size: 40px; font-weight: bold; color: #10b981; margin: 10px 0; }
        
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .chart-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        body.light-mode .chart-box { background: #ffffff; border-color: #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        canvas { max-width: 100%; max-height: 280px; }
    </style>
</head>
<body class="{{ 'light-mode' if request.cookies.get('theme') == 'light' else '' }}">
    
    <div class="dashboard-wrapper">
        <div class="dashboard-header">
            <div>
                <h1 style="margin:0;">📊 Analytics Dashboard</h1>
                <p style="color:#94a3b8; margin-top:5px;">Track your productivity, {{ user_name }}!</p>
            </div>
            <a href="/" class="back-btn">⬅️ Back to Board</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 style="margin:0; color:#cbd5e1;">Total Tasks</h3>
                <div class="stat-number" style="color: #3b82f6;">{{ total_tasks }}</div>
            </div>
            <div class="stat-card">
                <h3 style="margin:0; color:#cbd5e1;">Tasks Completed</h3>
                <div class="stat-number" style="color: #10b981;">{{ status_data.done }}</div>
            </div>
            <div class="stat-card">
                <h3 style="margin:0; color:#cbd5e1;">High Priority Remaining</h3>
                <div class="stat-number" style="color: #ef4444;">{{ priority_data.high }}</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h3 style="margin-bottom: 15px; color:#cbd5e1;">Task Progress (Status)</h3>
                <canvas id="statusChart"></canvas>
            </div>
            
            <div class="chart-box">
                <h3 style="margin-bottom: 15px; color:#cbd5e1;">Urgency (Priority)</h3>
                <canvas id="priorityChart"></canvas>
            </div>

            <div class="chart-box">
                <h3 style="margin-bottom: 15px; color:#cbd5e1;">Focus Areas (Category)</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Python Backend se aane wala JSON Data
        const statusData = {{ status_data | tojson }};
        const priorityData = {{ priority_data | tojson }};
        const categoryData = {{ category_data | tojson }};

        // Text Colors based on theme
        const isLightMode = document.body.classList.contains('light-mode');
        const textColor = isLightMode ? '#334155' : '#cbd5e1';

        // 1. Task Status (Pie Chart)
        new Chart(document.getElementById('statusChart'), {
            type: 'pie',
            data: {
                labels: ['Backlog', 'To Do', 'In Progress', 'Done'],
                datasets: [{
                    data: [statusData.backlog, statusData.todo, statusData.in_progress, statusData.done],
                    backgroundColor: ['#64748b', '#3b82f6', '#f59e0b', '#10b981'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: textColor } } } }
        });

        // 2. Task Priority (Bar Chart)
        new Chart(document.getElementById('priorityChart'), {
            type: 'bar',
            data: {
                labels: ['High Priority', 'Medium Priority', 'Low Priority'],
                datasets: [{
                    label: 'Number of Tasks',
                    data: [priorityData.high, priorityData.medium, priorityData.low],
                    backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6'],
                    borderRadius: 6
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, ticks: { color: textColor, stepSize: 1 } },
                    x: { ticks: { color: textColor } }
                }
            }
        });

        // 3. Task Category (Doughnut Chart)
        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: ['Personal', 'Work', 'Urgent'],
                datasets: [{
                    data: [categoryData.personal, categoryData.work, categoryData.urgent],
                    backgroundColor: ['#8b5cf6', '#0ea5e9', '#f43f5e'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: textColor } } } }
        });
    </script>
</body>
</html>
