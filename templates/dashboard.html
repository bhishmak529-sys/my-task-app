<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskPro Elite</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding: 20px; color: white; background: #0f172a; }
        body.light-mode { background: #f1f5f9; color: #0f172a; }
        .dash-container { max-width: 1000px; margin: auto; }
        .chart-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        body.light-mode .chart-box { background: white; border-color: #cbd5e1; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');</script>
    <div class="dash-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>📊 {{ user_name }}'s Dashboard</h2>
            <a href="/" style="background: #6366f1; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold;">← Back to Board</a>
        </div>

        <div class="chart-box" style="text-align: center;">
            <h3>Total Tasks: {{ total_tasks }}</h3>
        </div>

        <div class="grid-2">
            <div class="chart-box">
                <h3 style="text-align: center; margin-top:0;">Task Status</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-box">
                <h3 style="text-align: center; margin-top:0;">Task Priority</h3>
                <canvas id="priorityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: ['Backlog', 'To Do', 'In Progress', 'Done'],
                datasets: [{
                    /* VS Code Fix: Wrapped in quotes and Number() */
                    data: [
                        Number("{{ status_data.backlog }}"), 
                        Number("{{ status_data.todo }}"), 
                        Number("{{ status_data.in_progress }}"), 
                        Number("{{ status_data.done }}")
                    ],
                    backgroundColor: ['#64748b', '#3b82f6', '#f59e0b', '#10b981'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: localStorage.getItem('theme') === 'light' ? '#0f172a' : 'white' } } } }
        });

        const priorityCtx = document.getElementById('priorityChart').getContext('2d');
        new Chart(priorityCtx, {
            type: 'bar',
            data: {
                labels: ['High', 'Medium', 'Low'],
                datasets: [{
                    label: 'Tasks by Priority',
                    /* VS Code Fix: Wrapped in quotes and Number() */
                    data: [
                        Number("{{ priority_data.high }}"), 
                        Number("{{ priority_data.medium }}"), 
                        Number("{{ priority_data.low }}")
                    ],
                    backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6'],
                    borderRadius: 6
                }]
            },
            options: { 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { ticks: { color: localStorage.getItem('theme') === 'light' ? '#0f172a' : 'white', stepSize: 1 } },
                    x: { ticks: { color: localStorage.getItem('theme') === 'light' ? '#0f172a' : 'white' } }
                }
            }
        });
    </script>
</body>
</html>
