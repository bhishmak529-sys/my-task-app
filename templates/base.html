<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>TaskPro Elite</title>
    <style>
        /* 🚀 Alert Message को चमकदार और प्रीमियम बनाने की CSS */
        .custom-alert {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border: none !important;
            border-left: 6px solid #6366f1 !important; /* ब्लू साइड बॉर्डर */
            border-radius: 8px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            font-size: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .btn-close { filter: none !important; }
    </style>
</head>
<body class="bg-light" style="background-color: #0f172a !important;">
    <div class="container mt-4">
        
        <div style="max-width: 400px; margin: 0 auto;">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert custom-alert alert-dismissible fade show text-center fw-bold" role="alert">
                    🔒 {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        {% block body %}{% endblock %}
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
