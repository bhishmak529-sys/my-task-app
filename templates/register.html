<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="main-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div id="flash-container">
            {% for category, message in messages %}
              <div class="flash-alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            </div>
            <script>
              setTimeout(function() {
                var fc = document.getElementById('flash-container');
                if (fc) { fc.style.opacity = "0"; setTimeout(() => fc.remove(), 600); }
              }, 3000);
            </script>
          {% endif %}
        {% endwith %}

        <h1 style="text-align:center; color: #1e293b;">Join Us! 🚀</h1>
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" style="width:94%; margin-bottom:10px;" required>
            <input type="password" name="password" placeholder="Choose Password" style="width:94%; margin-bottom:15px;" required>
            <button type="submit" class="add-btn" style="width:100%; background: #10b981;">Register Free</button>
        </form>
        <div style="text-align:center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            <p style="color: #64748b; font-size: 14px;">Already a member? <a href="/login" style="color: #6366f1; text-decoration: none; font-weight: bold;">Login Here</a></p>
        </div>
    </div>
</body>
</html>
