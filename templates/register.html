<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro Elite - Register</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 25px; font-size: 28px; font-weight: bold; color: #10b981; }
        .input-box { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px 15px; margin-bottom: 20px; text-align: left; position: relative; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; display: block; }
        input { width: 85%; background: transparent; border: none; color: white; font-size: 16px; outline: none; margin-top: 5px; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #059669; }
        .pwd-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-30%); cursor: pointer; opacity: 0.6; font-size: 16px; user-select: none; }
        .pwd-toggle:hover { opacity: 1; }
        .link-text { margin-top: 20px; font-size: 14px; color: #94a3b8; display: block; text-decoration: none; }
        .link-text span { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #10b981;">Create Account 🚀</h2>
        
        <form action="/register" method="POST">
            <div class="input-box">
                <label>Choose a Username</label>
                <input type="text" name="username" placeholder="e.g. bhishmak_123" required>
            </div>
            
            <div class="input-box">
                <label>Create Password</label>
                <input type="password" id="reg_password" name="password" placeholder="••••••••" required>
                <span class="pwd-toggle" onclick="toggleRegPassword()">👁️</span>
            </div>
            
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <a href="/login" class="link-text">Already have an account? <span style="color: #10b981;">Login ➔</span></a>
    </div>

    <script>
        function toggleRegPassword() {
            const pwdField = document.getElementById('reg_password');
            const eyeIcon = event.target;
            if (pwdField.type === "password") {
                pwdField.type = "text";
                eyeIcon.innerText = "🙈";
            } else {
                pwdField.type = "password";
                eyeIcon.innerText = "👁️";
            }
        }
    </script>
</body>
</html>
