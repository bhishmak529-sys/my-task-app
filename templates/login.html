{% extends "base.html" %}
{% block body %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4 card shadow-lg p-4 border-0" style="background: #ffffff; color: #0f172a; border-radius: 12px;">
        <h2 class="text-center mb-4 fw-bold">Login 🔑</h2>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" style="background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1;" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" style="background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1;" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold" style="background: #6366f1; border: none; padding: 10px;">Login</button>
        </form>
        
        <div style="text-align: center; margin: 15px 0; color: #64748b; font-size: 12px; font-weight: bold;">OR</div>
        <a href="/login/google" class="btn w-100" style="background: white; color: #333; border: 2px solid #e2e8f0; font-weight: bold; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 10px; border-radius: 8px;">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google Logo"> Continue with Google
        </a>

        <p class="mt-4 text-center small" style="color: #64748b;">New? <a href="/register" style="color: #6366f1; text-decoration: none; font-weight: bold;">Register Here</a></p>
    </div>
</div>
{% endblock %}
