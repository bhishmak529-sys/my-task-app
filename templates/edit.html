{% extends 'base.html' %}
{% block body %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow p-4 border-0" style="background: #1e293b; color: white; border-radius: 12px;">
            <h4 class="fw-bold mb-4 text-center text-white">✏️ Edit Kanban Card</h4>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Task Title</label>
                    <input type="text" name="task_name" class="form-control" style="background: #0f172a; color: white; border: 1px solid #334155;" value="{{ task.name }}" required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Category</label>
                        <select name="category" class="form-select" style="background: #0f172a; color: white; border: 1px solid #334155;">
                            <option value="Personal" {% if task.category == 'Personal' %}selected{% endif %}>Personal</option>
                            <option value="Work" {% if task.category == 'Work' %}selected{% endif %}>Work 💻</option>
                            <option value="Urgent" {% if task.category == 'Urgent' %}selected{% endif %}>Urgent 🔥</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Priority</label>
                        <select name="priority" class="form-select" style="background: #0f172a; color: white; border: 1px solid #334155;">
                            <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                            <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Due Date</label>
                        <input type="text" name="due_date" class="form-control" style="background: #0f172a; color: white; border: 1px solid #334155;" value="{{ task.due_date }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Board Status</label>
                        <select name="status" class="form-select" style="background: #0f172a; color: white; border: 1px solid #334155;">
                            <option value="Backlog" {% if task.status == 'Backlog' %}selected{% endif %}>Backlog</option>
                            <option value="To Do" {% if task.status == 'To Do' %}selected{% endif %}>To Do</option>
                            <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                            <option value="Done" {% if task.status == 'Done' %}selected{% endif %}>Done</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 fw-bold" style="background: #6366f1; border: none;">Save Changes</button>
                    <a href="/" class="btn btn-outline-secondary w-100 text-white" style="border-color: #334155;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
