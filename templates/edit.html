<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="main-container">
        <h2 style="margin-top: 0; color: white;">Edit Task ✏️</h2>
        <form method="POST">
            <label style="color: #cbd5e1; font-size: 13px;">Task Title</label>
            <input type="text" name="task_name" value="{{ task.name }}" required>
            
            <label style="color: #cbd5e1; font-size: 13px;">Category</label>
            <select name="category">
                <option value="Personal" {% if task.category == 'Personal' %}selected{% endif %}>🏠 Personal</option>
                <option value="Work" {% if task.category == 'Work' %}selected{% endif %}>💻 Work</option>
                <option value="Urgent" {% if task.category == 'Urgent' %}selected{% endif %}>🔥 Urgent</option>
            </select>

            <label style="color: #cbd5e1; font-size: 13px;">Priority</label>
            <select name="priority">
                <option value="High" {% if task.priority == 'High' %}selected{% endif %}>🔴 High</option>
                <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>🟡 Medium</option>
                <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>🔵 Low</option>
            </select>

            <label style="color: #cbd5e1; font-size: 13px;">Status</label>
            <select name="status">
                <option value="Backlog" {% if task.status == 'Backlog' %}selected{% endif %}>📁 Backlog</option>
                <option value="To Do" {% if task.status == 'To Do' %}selected{% endif %}>📋 To Do</option>
                <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>⚡ In Progress</option>
                <option value="Done" {% if task.status == 'Done' %}selected{% endif %}>✅ Done</option>
            </select>

            <label style="color: #cbd5e1; font-size: 13px;">Due Date</label>
            <input type="text" name="due_date" value="{{ task.due_date or '' }}" placeholder="YYYY-MM-DD">

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" class="add-btn" style="flex: 1;">Save Changes</button>
                <a href="/" class="add-btn" style="flex: 1; text-align: center; text-decoration: none; background: #334155;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
